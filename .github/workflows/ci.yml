name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: api

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: api

      - name: Lint
        run: npm run lint
        working-directory: api

      - name: Test
        run: npm test
        working-directory: api

      - name: Build Docker image
        run: docker build -t room-booking-api ./api

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: next-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: next-frontend

      - name: Lint
        run: npm run lint
        working-directory: next-frontend

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:3001 \
            -t room-booking-frontend \
            ./next-frontend
