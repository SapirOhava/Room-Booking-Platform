services:
  db:
    image: postgres:16
    container_name: room-booking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: room_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d room_booking"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
